name: Update Homebrew Tap

on:
  release:
    types: [published]

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Compute tarball sha256
        id: sha
        run: |
          VERSION="${{ github.ref_name }}"
          URL="https://github.com/kristianhansen/universal-claude-code-config/archive/refs/tags/${VERSION}.tar.gz"
          SHA=$(curl -fsSL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: kristianhansen/homebrew-universal-claude-code-config
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Update formula
        run: |
          VERSION="${{ steps.sha.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          URL="${{ steps.sha.outputs.url }}"
          sed -i "s|url \".*\"|url \"$URL\"|" Formula/claude-config.rb
          sed -i "s|sha256 \".*\"|sha256 \"$SHA\"|" Formula/claude-config.rb
          sed -i "s|version \".*\"|version \"$VERSION\"|" Formula/claude-config.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-config.rb
          git diff --staged --quiet || git commit -m "Update formula to ${{ github.ref_name }}"
          git push
